<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroFila - SuperAdmin AI Advanced Onboarding</title>
  
  <!-- Collegamento allo stile grafico unificato anti-crash -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    /* Estensioni di stile specifiche per la console privata SuperAdmin */
    .admin-box { max-width: 650px; margin: 40px auto; background: var(--bg-card, #1e293b); padding: 35px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
    .admin-box h1 { color: var(--color-pronto, #10b981); font-size: 1.6rem; margin-bottom: 6px; }
    .subtitle { color: var(--text-muted, #94a3b8); font-size: 0.9rem; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; color: #f1f5f9; font-weight: 600; font-size: 0.9rem; }
    select, input[type="file"], input[type="number"], button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; }
    .row-flex { display: flex; gap: 15px; }
    .col-flex { flex: 1; }
    @media (max-width: 540px) { .row-flex { flex-direction: column; gap: 0; } }
    button { background: var(--color-pronto, #10b981); color: #001e1d; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; font-size: 1.1rem; }
    button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }
    #status { padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; font-size: 0.95rem; display: none; line-height: 1.4; }
    #qr-preview-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
    @media (max-width: 480px) { #qr-preview-box { grid-template-columns: repeat(2, 1fr); } }
    .qr-card { background: #0f172a; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.8rem; border: 1px solid #334155; }
    .qr-card img { max-width: 100%; height: auto; margin: 8px auto; display: block; border-radius: 4px; }
  </style>

  <!-- CDN della libreria QRCode.js ufficiale (Caricata in modo sicuro prima dei moduli) -->
  <script src="https://cloudflare.com"></script>
</head>
<body>

  <div class="admin-box">
    <h1>⚡ ZeroFila SuperAdmin Studio</h1>
    <div class="subtitle">Strumento riservato per l'onboarding lampo dei locali (Menu AI, Loghi e QR-Kit).</div>
    
    <!-- 1. Menu a tendina dei locali -->
    <label for="select-ristorante">1. Seleziona il Locale da configurare</label>
    <select id="select-ristorante">
      <option value="">Caricamento locali in corso...</option>
    </select>

    <!-- 2. Sezione File Caricamenti -->
    <div class="row-flex">
      <div class="col-flex">
        <label for="logo-ristorante">2. Carica Logo del Locale</label>
        <input type="file" id="logo-ristorante" accept="image/*">
      </div>
      <div class="col-flex">
        <label for="foto-menu">3. Foto Menù Cartaceo (Per AI)</label>
        <input type="file" id="foto-menu" accept="image/*">
      </div>
    </div>

    <!-- 3. Sezione Configurazione Marketing QR -->
    <div class="row-flex" style="border-top: 1px dashed #334155; padding-top: 15px; margin-top: 10px;">
      <div class="col-flex">
        <label for="check-qr-generico">Genera QR Vetrofania / Social?</label>
        <select id="check-qr-generico">
          <option value="si">Sì, genera Link generico (es. Asporto)</option>
          <option value="no">No, locale solo al tavolo</option>
        </select>
      </div>
      <div class="col-flex">
        <label for="num-tavoli-qr">Numero tavoli (QR-Kit sala)</label>
        <input type="number" id="num-tavoli-qr" value="0" min="0" placeholder="es: 15">
      </div>
    </div>

    <!-- Pulsante di avvio transazione massiva -->
    <button type="button" id="btn-avvia-onboarding">🚀 Esegui Onboarding Completo a Schermo</button>

    <!-- Console di log e avanzamento -->
    <div id="status"></div>
    
    <!-- Contenitore di calcolo invisibile usato dalla libreria QR per evitare crash di rendering -->
    <div id="qr-hidden-generator" style="display: none;"></div>
    
    <!-- Box dei risultati dei QR scaricabili -->
    <h3 id="title-qr-box" style="margin-top:25px; font-size:1.1rem; display:none; color:var(--color-pronto);">📋 QR-Kit Generato (Pronto da salvare/stampare):</h3>
    <div id="qr-preview-box"></div>
  </div>

  <!-- Caricamento dello script in modalità modulo ES6 -->
  <script type="module" src="onboarding.js"></script>
</body>
</html>
