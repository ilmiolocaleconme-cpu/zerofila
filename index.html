<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroFila - Ordina Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="branding-header">
    <h1 id="restaurant-name">ZeroFila Menu</h1>
  </header>

  <div class="app-layout">
    <!-- Contenitore Menu Dinamico -->
    <main id="menu-container">
      <div class="loading-state">Connessione al database...</div>
    </main>

    <!-- Sidebar Carrello -->
    <aside id="cart-sidebar">
      <h2>Il tuo Carrello</h2>
      <div id="cart-items"></div>
      <div class="cart-footer">
        <div class="total-row">Totale: <span id="cart-total">€ 0.00</span></div>
        <button id="send-order">🛒 Procedi all'Ordine</button>
      </div>
    </aside>
  </div>

  <!-- Unico punto di ingresso: previene corse critiche dei moduli browser -->
  <script type="module" src="menu.js"></script>

</body>
</html>
