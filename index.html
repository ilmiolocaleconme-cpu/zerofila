<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroFila - Ordina Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="branding-header">
    <h1 id="restaurant-name">ZeroFila Menu</h1>
  </header>

  <div class="app-layout">
    <main id="menu-container">
      <div class="loading-state">Connessione al database...</div>
    </main>

    <aside id="cart-sidebar">
      <h2>Il tuo Carrello</h2>
      <div id="cart-items"></div>
      <div class="cart-footer">
        <div class="total-row">
          <span>Totale:</span>
          <span id="cart-total">€ 0.00</span>
        </div>
        <button id="send-order" type="button">🛒 Procedi all'Ordine</button>
      </div>
    </aside>
  </div>

  <!-- Aggiornato a v=5.0.0 per distruggere definitivamente la vecchia cache -->
  <script type="module">
    const script = document.createElement('script');
    script.type = 'module';
    script.src = `menu.js?v=5.0.0`;
    document.body.appendChild(script);
  </script>

</body>
</html>
