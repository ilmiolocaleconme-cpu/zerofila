<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroFila - Ordina Online</title>
  
  <!-- Collegamento allo stile grafico unificato del menu e del carrello -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Intestazione dinamica del ristorante -->
  <header class="branding-header">
    <h1 id="restaurant-name">ZeroFila Menu</h1>
  </header>

  <!-- Layout principale dell'applicazione -->
  <div class="app-layout">
    <!-- Contenitore dinamico dove vengono stampate le categorie e i prodotti del CSV -->
    <main id="menu-container">
      <div class="loading-state">Connessione al database...</div>
    </main>

    <!-- Sidebar laterale del carrello per i clienti -->
    <aside id="cart-sidebar">
      <h2>Il tuo Carrello</h2>
      <div id="cart-items"></div>
      
      <div class="cart-footer">
        <div class="total-row">
          <span>Totale:</span>
          <span id="cart-total">€ 0.00</span>
        </div>
        <button id="send-order" type="button">🛒 Procedi all'Ordine</button>
      </div>
    </aside>
  </div>

  <!-- INGRESSO CENTRALIZZATO STANDARD: Pulito, leggero e 100% scalabile per il SaaS -->
  <script type="module" src="main.js"></script>

</body>
</html>
